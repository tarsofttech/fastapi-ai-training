version: "3.9"

services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot
      POSTGRES_DB: chatbot
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - faiss-index:/app/data/faiss_index
      - uploaded-docs:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend-admin:
    build: ./frontend-admin
    ports:
      - "3001:80"

  frontend-user:
    build: ./frontend-user
    ports:
      - "3000:80"

volumes:
  postgres-data:
  faiss-index:
  uploaded-docs:
